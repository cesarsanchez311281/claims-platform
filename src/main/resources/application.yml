spring:
  application:
    name: claims-platform
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/claims_platform}
    username: ${DB_USERNAME:claims_user}
    password: ${DB_PASSWORD:claims_password}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html

