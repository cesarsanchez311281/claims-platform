services:
  postgres:
    image: postgres:17-alpine
    container_name: claims-platform-postgres
    environment:
      POSTGRES_DB: claims_platform
      POSTGRES_USER: claims_user
      POSTGRES_PASSWORD: claims_password
    ports:
      - "5432:5432"
    volumes:
      - claims-platform-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U claims_user -d claims_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  claims-platform-postgres-data:

